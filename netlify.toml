# Netlify configuration for the FinBiz Operator Console (internal tool)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — single-page app, every route serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Internal tool: ask search engines not to index it
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
