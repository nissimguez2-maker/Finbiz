# Netlify configuration for the FinBiz Operator Console (internal tool)
# The deploy build runs vite directly. Type-checking is the local/commit-time gate
# (npm run build = tsc --noEmit && vite build); running tsc inside Netlify's builder
# has been flaky (opaque exit 2), and vite build (esbuild) is fast and robust.
[build]
  command = "npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — single-page app, every route serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Internal tool: ask search engines not to index it
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
