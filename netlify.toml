# Netlify configuration for the FinBiz Operator Console (internal tool)
# NOTE: temporarily deploying the prebuilt dist/ (committed) to bypass an opaque
# Netlify build-stage failure. `npm run build` works locally + in a clean
# `npm ci` reproduction; restore command = "npm run build" once CI is sorted.
[build]
  command = "echo 'Deploying prebuilt dist/'"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — single-page app, every route serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Internal tool: ask search engines not to index it
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
